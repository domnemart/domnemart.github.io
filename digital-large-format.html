<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>digital large format — domen martinčič</title>
<meta property="og:type" content="website">
<meta property="og:title" content="digital large format — domen martinčič">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto Mono', monospace; background:linear-gradient(135deg,#1a1f2e,#2a2035); color:#ffffff; text-transform:lowercase; min-height:100vh; }
nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:1.5rem 3rem; display:flex; justify-content:space-between; align-items:center; }
.nav-name { font-size:14px; font-weight:300; letter-spacing:0.15em; color:rgba(255,255,255,0.6); text-decoration:none; }
.nav-back { font-size:12px; font-weight:300; letter-spacing:0.2em; color:rgba(255,255,255,0.4); text-decoration:none; transition:color 0.2s; }
.nav-back:hover { color:rgba(255,255,255,0.8); }
.split { display:grid; grid-template-columns:320px 1fr; min-height:100vh; padding-top:60px; }
.left { position:sticky; top:60px; height:calc(100vh - 60px); padding:3rem 2.5rem; display:flex; flex-direction:column; justify-content:space-between; overflow-y:auto; scrollbar-width:none; }
.left::-webkit-scrollbar { display:none; }
.left-top { display:flex; flex-direction:column; gap:2rem; }
.page-title { font-size:19px; font-weight:300; letter-spacing:0.06em; line-height:1.5; color:rgba(255,255,255,0.9); }
.page-subtitle { font-size:12px; font-weight:300; letter-spacing:0.15em; color:rgba(255,255,255,0.35); margin-top:0.5rem; }
.description p { font-size:12px; font-weight:300; letter-spacing:0.05em; line-height:2; color:rgba(255,255,255,0.5); margin-bottom:1rem; }
.description p:last-child { margin-bottom:0; }
.related { display:flex; flex-direction:column; gap:0.75rem; }
.related-label { font-size:10px; letter-spacing:0.3em; color:rgba(255,255,255,0.2); margin-bottom:0.25rem; }
.related-link { font-size:12px; font-weight:300; letter-spacing:0.1em; color:rgba(255,255,255,0.5); text-decoration:none; display:flex; justify-content:space-between; align-items:baseline; transition:color 0.2s; gap:1rem; }
.related-link:hover { color:rgba(255,255,255,0.9); }
.related-link .link-year { font-size:11px; color:rgba(255,255,255,0.2); flex-shrink:0; }
.related-link:hover .link-year { color:rgba(255,255,255,0.5); }
.specs { display:flex; flex-direction:column; gap:0.85rem; }
.spec-item { display:flex; flex-direction:column; gap:0.2rem; }
.spec-label { font-size:10px; letter-spacing:0.25em; color:rgba(255,255,255,0.2); }
.spec-value { font-size:12px; font-weight:300; letter-spacing:0.1em; color:rgba(255,255,255,0.6); }
.right { padding:3rem 3rem 0; display:flex; flex-direction:column; gap:1.5rem; }
.right-footer { text-align:center; padding:2rem 0; font-size:11px; letter-spacing:0.2em; color:rgba(255,255,255,0.15); margin-top:2rem; }
.img-full { width:100%; aspect-ratio:16/9; overflow:hidden; }
.img-full img { width:100%; height:100%; object-fit:cover; display:block; }
.img-full.clickable { cursor:pointer; }
.img-full.clickable img { transition:filter 0.15s; }
.img-full.clickable:hover img { filter:brightness(1.07); }
.img-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.img-grid-item { aspect-ratio:16/9; overflow:hidden; }
.img-grid-item img { width:100%; height:100%; object-fit:cover; display:block; }
.img-grid-item.clickable { cursor:pointer; }
.img-grid-item.clickable img { transition:filter 0.15s; }
.img-grid-item.clickable:hover img { filter:brightness(1.07); }
.img-grid-item.placeholder { background:rgba(255,255,255,0.04); }
#lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; align-items:center; justify-content:center; cursor:zoom-out; }
#lb.open { display:flex; }
#lb img { max-width:90vw; max-height:90vh; object-fit:contain; }
.text-block { padding:1.5rem 0; border-top:1px solid rgba(255,255,255,0.07); }
.text-block p { font-size:12px; font-weight:300; letter-spacing:0.05em; line-height:2; color:rgba(255,255,255,0.5); margin-bottom:0.75rem; }
.text-block p:last-child { margin-bottom:0; }
.text-block h2 { font-size:12px; font-weight:400; letter-spacing:0.2em; color:rgba(255,255,255,0.35); margin-bottom:0.75rem; }
.text-block.no-border { border-top:none; }
.img-caption { font-size:10px; font-weight:300; letter-spacing:0.15em; color:rgba(255,255,255,0.25); margin-top:-1rem; }
@media (max-width:768px) { nav { padding:1.25rem 1.5rem; } .split { grid-template-columns:1fr; } .left { position:static; height:auto; } .right { padding:0 1.5rem; gap:1rem; } .img-grid { grid-template-columns:1fr; gap:0.5rem; } .right-footer { padding:2rem; } .text-block { padding:1rem 0; } }
</style>
</head>
<body>
<nav>
  <a class="nav-name" href="index.html">domen martinčič</a>
  <a class="nav-back" href="index.html">← back</a>
</nav>
<div class="split">
  <div class="left">
    <div class="left-top">
      <div>
        <h1 class="page-title">digital large format</h1>
        <p class="page-subtitle">phase one / IQ4 150mp</p>
      </div>
    </div>
    <div class="specs"><div class="spec-item"><span class="spec-label">sensor</span><span class="spec-value"></span></div><div class="spec-item"><span class="spec-label">resolution</span><span class="spec-value"></span></div><div class="spec-item"><span class="spec-label">dynamic range</span><span class="spec-value"></span></div></div>
  </div>
  <div class="right">
    <div class="text-block"><h2>cascac</h2><p>sacasca</p></div>
    <div class="right-footer">© <span id="yr"></span> domen martinčič</div>
  </div>
</div>
<div id="lb"><img id="lbImg" src="" alt=""></div>
<script>
document.getElementById('yr').textContent=new Date().getFullYear();
var _lb=document.getElementById('lb');
document.querySelectorAll('.img-full.clickable,.img-grid-item.clickable').forEach(function(el){
  el.addEventListener('click',function(){
    var img=el.querySelector('img');if(!img)return;
    document.getElementById('lbImg').src=img.src;
    _lb.classList.add('open');
  });
});
_lb.addEventListener('click',function(){_lb.classList.remove('open');document.getElementById('lbImg').src='';});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){_lb.classList.remove('open');document.getElementById('lbImg').src='';}});
</script>
</body>
</html>
